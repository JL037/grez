services:
  postgres:
    image: postgres:16-alpine
    container_name: grez-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: grez
      POSTGRES_PASSWORD: grez
      POSTGRES_DB: grez
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grez"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
